version: '3.8'

services:
  # API Gateway
  api-gateway:
    build: .
    container_name: dotnet-api-gateway
    ports:
      - "5000:5000"
      - "5001:5001"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:5000
      DOTNET_USE_POLLING_FILE_WATCHER: 'true'
    volumes:
      - ./appsettings.Development.json:/app/appsettings.json
      - ./:/src
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    depends_on:
      - backend-service
    networks:
      - gateway-network
    labels:
      - "com.example.description=API Gateway Service"

  # Example Backend Service
  backend-service:
    image: nginx:latest
    container_name: backend-api
    ports:
      - "3000:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - gateway-network
    labels:
      - "com.example.description=Backend Service for Testing"

  # Optional: Redis for distributed caching (uncomment to enable)
  # redis:
  #   image: redis:7-alpine
  #   container_name: gateway-redis
  #   ports:
  #     - "6379:6379"
  #   restart: unless-stopped
  #   healthcheck:
  #     test: ["CMD", "redis-cli", "ping"]
  #     interval: 30s
  #     timeout: 5s
  #     retries: 3
  #   networks:
  #     - gateway-network
  #   volumes:
  #     - redis-data:/data
  #   labels:
  #     - "com.example.description=Redis Cache"

  # Optional: Prometheus for metrics (uncomment to enable)
  # prometheus:
  #   image: prom/prometheus:latest
  #   container_name: gateway-prometheus
  #   ports:
  #     - "9090:9090"
  #   volumes:
  #     - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
  #     - prometheus-data:/prometheus
  #   command:
  #     - '--config.file=/etc/prometheus/prometheus.yml'
  #     - '--storage.tsdb.path=/prometheus'
  #   restart: unless-stopped
  #   networks:
  #     - gateway-network
  #   labels:
  #     - "com.example.description=Prometheus Metrics"

  # Optional: Grafana for visualization (uncomment to enable)
  # grafana:
  #   image: grafana/grafana:latest
  #   container_name: gateway-grafana
  #   ports:
  #     - "3001:3000"
  #   environment:
  #     GF_SECURITY_ADMIN_PASSWORD: admin
  #     GF_INSTALL_PLUGINS: 'grafana-worldmap-panel'
  #   volumes:
  #     - grafana-data:/var/lib/grafana
  #   restart: unless-stopped
  #   depends_on:
  #     - prometheus
  #   networks:
  #     - gateway-network
  #   labels:
  #     - "com.example.description=Grafana Dashboards"

networks:
  gateway-network:
    driver: bridge

volumes:
  # redis-data:
  # prometheus-data:
  # grafana-data:

# Usage:
#
# Start all services:
#   docker-compose up -d
#
# View logs:
#   docker-compose logs -f api-gateway
#
# Stop all services:
#   docker-compose down
#
# Remove all volumes (clean reset):
#   docker-compose down -v
#
# Rebuild images:
#   docker-compose up -d --build
#
# Access services:
#   Gateway: http://localhost:5000
#   Backend: http://localhost:3000
#   Prometheus: http://localhost:9090
#   Grafana: http://localhost:3001 (admin/admin)
