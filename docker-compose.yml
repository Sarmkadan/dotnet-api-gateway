# =============================================================================
# Docker Compose configuration for DotNet API Gateway
# =============================================================================

version: '3.8'

services:
  # API Gateway
  api-gateway:
    build: .
    container_name: dotnet-api-gateway
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      DOTNET_USE_POLLING_FILE_WATCHER: 'true'
      REDIS_CONNECTION_STRING: redis:6379
    volumes:
      - ./appsettings.Development.json:/app/appsettings.json
      - ./:/src
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    depends_on:
      - redis
      - backend-service
    networks:
      - gateway-network

  # Example Backend Service
  backend-service:
    image: nginx:latest
    container_name: backend-api
    ports:
      - "3000:80"
    restart: unless-stopped
    networks:
      - gateway-network

  # Redis for distributed caching
  redis:
    image: redis:7-alpine
    container_name: gateway-redis
    ports:
      - "6379:6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - gateway-network

networks:
  gateway-network:
    driver: bridge
